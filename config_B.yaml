# config_B.yaml - L1 + 多尺度（无梯度、无通道加权、无偏亮惩罚）
data:
  train_dir: "dataset/train"
  val_dir: "dataset/val"
  test_dir: "dataset/test"
  exr_epsilon: 0.001

model:
  type: "tiny"
  features: [32, 48, 64]

training:
  batch_size: 16
  patch_size: 128
  epochs: 30
  lr: 0.0005
  weight_decay: 0.00001
  lr_patience: 10
  lr_factor: 0.5
  min_lr: 0.00001
  grad_clip: 1.0
  gradient_accumulation: 1
  use_amp: false
  num_workers: 0
  warmup_epochs: 5
  seed: 42

loss:
  primary: "l1"
  use_channel_weight: false
  use_positive_bias: false
  use_multiscale: true
  multiscale_weight: 0.1
  multiscale_start_epoch: 5
  multiscale_scales: [1, 2, 4]
  multiscale_scale_weights: [1.0, 0.5, 0.25]
  use_gradient: false
  use_perceptual: false

data_augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate_90_prob: 0.3
  color_jitter: false

validation:
  val_every: 1
  save_best: true
  early_stop_patience: 25
  metrics: ["psnr", "ssim"]

output:
  checkpoint_dir: "output_n2n/B/checkpoints"
  log_dir: "output_n2n/B/logs"
  vis_dir: "output_n2n/B/visualizations"
  save_every: 2